<!DOCTYPE html>
<html>
<head>
  <title>Helping Hands</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .tab { display: none; }
    .active { display: block; }
    button { margin: 5px; padding: 8px; }
    input { margin: 5px; padding: 6px; }
    .card { border: 1px solid #333; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>

<h1>🤝 Helping Hands</h1>

<!-- NAV BUTTONS -->
<button onclick="showTab('home')">Home</button>
<button onclick="showTab('login')">Login/Signup</button>
<button onclick="showTab('request')">Post Request</button>
<button onclick="showTab('dashboard')">Dashboard</button>

<hr>

<!-- HOME -->
<div id="home" class="tab active">
  <h2>Welcome</h2>
  <p>Helping Hands connects people who need help with people who can help.</p>
</div>

<!-- LOGIN -->
<div id="login" class="tab">
  <h2>Login</h2>
  <input id="loginUser" placeholder="Username"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>

  <hr>

  <h2>Signup</h2>
  <input id="signupUser" placeholder="Username"><br>
  <input id="signupPass" type="password" placeholder="Password"><br>
  <button onclick="signup()">Signup</button>
</div>

<!-- REQUEST -->
<div id="request" class="tab">
  <h2>Post Help Request</h2>
  <input id="name" placeholder="Your Name"><br>
  <input id="need" placeholder="Blood / Help Type"><br>
  <input id="location" placeholder="Location"><br>
  <button onclick="submitRequest()">Submit</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
  <h2>All Requests</h2>
  <div id="list"></div>
</div>

<script>
/* ---------- TAB SWITCH ---------- */
function showTab(tab) {
  let tabs = document.querySelectorAll(".tab");
  tabs.forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if (tab === "dashboard") loadRequests();
}

/* ---------- LOGIN / SIGNUP (LOCAL STORAGE) ---------- */
function signup() {
  let u = document.getElementById("signupUser").value;
  let p = document.getElementById("signupPass").value;

  if (!u || !p) return alert("Fill all fields");

  localStorage.setItem("user_" + u, p);
  alert("Signup successful!");
}

function login() {
  let u = document.getElementById("loginUser").value;
  let p = document.getElementById("loginPass").value;

  let stored = localStorage.getItem("user_" + u);

  if (stored === p) {
    alert("Login successful!");
  } else {
    alert("Invalid credentials");
  }
}

/* ---------- SUBMIT REQUEST ---------- */
function submitRequest() {
  let name = document.getElementById("name").value;
  let need = document.getElementById("need").value;
  let location = document.getElementById("location").value;

  if (!name || !need || !location) {
    return alert("Fill all fields");
  }

  let data = JSON.parse(localStorage.getItem("requests") || "[]");

  data.push({ name, need, location });

  localStorage.setItem("requests", JSON.stringify(data));

  alert("Request submitted!");
}

/* ---------- LOAD REQUESTS ---------- */
function loadRequests() {
  let data = JSON.parse(localStorage.getItem("requests") || "[]");
  let list = document.getElementById("list");

  list.innerHTML = "";

  data.forEach(r => {
    list.innerHTML += `
      <div class="card">
        <b>Name:</b> ${r.name}<br>
        <b>Need:</b> ${r.need}<br>
        <b>Location:</b> ${r.location}
      </div>
    `;
  });
}
</script>

</body>
</html>
