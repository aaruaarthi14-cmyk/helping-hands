<!DOCTYPE html>
<html>
<head>
    <title>Helping Poor People App</title>
</head>

<body style="font-family:Arial; text-align:center; background:#f0f8ff;">

<!-- 🔐 LOGIN -->
<div id="loginPage" style="margin-top:80px;">
    <h2>Login 🔐</h2>

    <input id="name" placeholder="Enter your name"
    style="padding:10px; width:200px;">

    <br><br>

    <button onclick="login()"
    style="padding:10px 20px; background:blue; color:white;">
        Login
    </button>

    <p id="loginMsg"></p>
</div>

<!-- 💰 MAIN APP -->
<div id="appPage" style="display:none;">

    <h2>Helping Poor People 🤝</h2>

    <p>Welcome, <span id="userName"></span></p>

    <!-- 👥 CATEGORY SELECT -->
    <h3>Select Category</h3>

    <select id="category" style="padding:10px;">
        <option value="beggar">🧍 Beggars</option>
        <option value="child">👶 Children</option>
        <option value="old">👴 Old People</option>
    </select>

    <br><br>

    <!-- 📊 LIVE COUNTERS -->
    <h3>Live Report 📊</h3>

    <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">

        <div style="background:white; padding:15px; width:150px; border-radius:10px;">
            <h4>Beggars</h4>
            <h2 id="beggar">0</h2>
        </div>

        <div style="background:white; padding:15px; width:150px; border-radius:10px;">
            <h4>Children</h4>
            <h2 id="child">0</h2>
        </div>

        <div style="background:white; padding:15px; width:150px; border-radius:10px;">
            <h4>Old People</h4>
            <h2 id="old">0</h2>
        </div>

    </div>

    <br>

    <!-- 💰 DONATION -->
    <input id="amount" placeholder="Enter donation amount"
    style="padding:10px; width:200px;">

    <br><br>

    <button onclick="donate()"
    style="padding:10px 20px; background:green; color:white;">
        Donate
    </button>

    <p id="msg"></p>

    <!-- 🎉 THANK YOU -->
    <div id="thankYou" style="
        display:none;
        margin-top:20px;
        padding:10px;
        background:#d4edda;
        color:#155724;
        border-radius:10px;">
        🎉 Thank you for your donation!
    </div>

</div>

<script>

// 🔐 LOGIN
function login() {
    let name = document.getElementById("name").value;

    if(name === "") {
        document.getElementById("loginMsg").innerText =
        "Please enter name ❗";
    } else {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";
        document.getElementById("userName").innerText = name;

        startCounters();
    }
}

// 💰 DONATE
function donate() {
    let amount = document.getElementById("amount").value;

    if(amount === "") {
        document.getElementById("msg").innerText =
        "Enter amount ❗";
        document.getElementById("thankYou").style.display = "none";
    } else {
        document.getElementById("msg").innerText =
        "You donated ₹" + amount;

        document.getElementById("thankYou").style.display = "block";

        setTimeout(() => {
            document.getElementById("thankYou").style.display = "none";
        }, 2000);
    }
}

// 📊 LIVE COUNTERS
function startCounter(id, target) {
    let count = 0;

    let interval = setInterval(() => {
        count++;
        document.getElementById(id).innerText = count;

        if(count >= target) {
            clearInterval(interval);
        }
    }, 5);
}

function startCounters() {
    startCounter("beggar", 850);
    startCounter("child", 2500);
    startCounter("old", 1200);
}

</script>

</body>
</html>
